<script>
        // Micro-interaction for the button
        document.querySelector('button.bg-primary').addEventListener('mouseenter', function() {
            this.querySelector('.material-symbols-outlined').style.transform = 'translateX(4px)';
        });
        document.querySelector('button.bg-primary').addEventListener('mouseleave', function() {
            this.querySelector('.material-symbols-outlined').style.transform = 'translateX(0px)';
        });

        // Simple transition logic for the demo (simulating screen movement)
        const nextBtn = document.querySelector('button.bg-primary');
        nextBtn.addEventListener('click', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                // In a real app, logic would go here to navigate to Step 2
                alert('Transitioning to Screen 2 of 3...');
                document.body.style.opacity = '1';
            }, 500);
        });
    </script>
