<script>
    // Micro-interaction for clicking locations
    document.querySelectorAll('button.group').forEach(btn => {
      btn.addEventListener('click', () => {
        // Toggle visual active state (mock interaction)
        const dot = btn.querySelector('.w-3.h-3');
        if (dot) {
          dot.classList.toggle('hidden');
        }
      });
    });

    // Custom Scrollbar hover behavior
    const scrollContainer = document.querySelector('.overflow-y-auto');
    scrollContainer.addEventListener('mouseenter', () => {
      scrollContainer.classList.add('scrollbar-visible');
    });
  </script>
