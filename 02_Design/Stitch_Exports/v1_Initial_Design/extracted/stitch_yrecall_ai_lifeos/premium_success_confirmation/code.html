<script>
        // Simple confetti effect for celebration
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#006a6a', '#3a5f94', '#93f2f2', '#a3f69c'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = '50%';
                confetti.style.top = '-20px';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.opacity = Math.random();
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(confetti);

                const duration = Math.random() * 3 + 2;
                const destinationY = window.innerHeight + 20;
                const destinationX = (Math.random() - 0.5) * 200;

                confetti.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${destinationX}px, ${destinationY}px) rotate(720deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => confetti.remove();
            }
        }

        // Trigger confetti on load
        window.addEventListener('load', () => {
            setTimeout(createConfetti, 500);
        });

        // Add hover interaction to the illustration
        const illustration = document.querySelector('.celebration-float');
        illustration.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = illustration.getBoundingClientRect();
            const x = (e.clientX - left) / width - 0.5;
            const y = (e.clientY - top) / height - 0.5;
            illustration.style.transform = `perspective(1000px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg)`;
        });

        illustration.addEventListener('mouseleave', () => {
            illustration.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
        });
    </script>
