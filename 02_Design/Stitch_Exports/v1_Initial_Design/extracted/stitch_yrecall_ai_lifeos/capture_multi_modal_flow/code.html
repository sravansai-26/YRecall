<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Capture - YRecall</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-bar {
            animation: wave 1.2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 8px; opacity: 0.3; }
            50% { height: 48px; opacity: 1; }
        }
        .capture-overlay {
            background: radial-gradient(circle at center, rgba(144, 239, 239, 0.05) 0%, transparent 70%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

                extend: {
                    "colors": {

                        "on-primary-fixed-variant": "#1f477b",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#006e6e",
                        "surface-dim": "#e0d9d1",
                        "primary": "#001e40",
                        "surface-container-high": "#eee7df",
                        "primary-fixed": "#d5e3ff",
                        "on-background": "#1e1b17",
                        "on-tertiary-container": "#5ead5c",
                        "surface-container-low": "#faf3eb",
                        "outline": "#737780",
                        "on-surface": "#1e1b17",
                        "primary-fixed-dim": "#a7c8ff",
                        "background": "#fff8f1",
                        "secondary": "#006a6a",
                        "surface-variant": "#e8e1da",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#3a5f94",
                        "on-primary-container": "#799dd6",
                        "on-tertiary-fixed": "#002204",
                        "inverse-on-surface": "#f7f0e8",
                        "outline-variant": "#c3c6d1",
                        "secondary-container": "#90efef",
                        "inverse-primary": "#a7c8ff",
                        "on-surface-variant": "#43474f",
                        "inverse-surface": "#33302b",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#001b3c"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {

                        "gutter": "16px",

                    "fontFamily": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface selection:bg-secondary-container antialiased overflow-hidden">
<!-- Top Navigation Anchor (Manual Implementation based on TopAppBar JSON) -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface dark:bg-background">
<div class="flex justify-between items-center w-full px-margin-mobile h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A clean, minimalist profile portrait of a professional user in a bright, high-key studio setting. The image uses a soft, warm color palette consistent with a premium life operating system UI, emphasizing calm intelligence and sophistication." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNrSxRNw1F79gRIa_vk9cjr2UCpKCecah8XrYxc_7OEACp9Dp9kypoahGKzVeQEfpGbNCIskcBO340m_i9ZytIxokGrOf1UbmEGwnvV4ZLA7PyW67n5b512nYPj9UjzcfabMEww1JJ2SfU45KvwPODW3UYg2b0uno9FFmMWExpklDymgsfg3ozRkdykv-xwlRvPCiV9LXx3dEOpHWNtjynkSuL6gCnS13FCMiFPKGV0NIH3zgSwKQWpSvngY4A2BtgfMATxs6E5f4"/>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">YRecall</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</div>
</header>
<!-- Main Content: Capture Interface -->
<main class="relative min-h-screen pt-16 pb-20 capture-overlay flex flex-col items-center justify-center">
<!-- Header Text -->
<div class="text-center px-lg mb-xxl">
<h2 class="font-headline-md text-headline-md text-primary mb-sm">What's on your mind?</h2>
<p class="text-on-surface-variant font-body-md">Capture everything, YRecall handles the rest.</p>
</div>
<!-- Waveform Visualization -->
<div class="w-full max-w-md h-32 flex items-center justify-center gap-1.5 px-lg mb-xxl">
<!-- Dynamic JS will populate or we can static mock bars for initial load -->
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.1s; height: 16px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.3s; height: 24px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.2s; height: 40px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.5s; height: 32px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.4s; height: 48px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.6s; height: 56px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.3s; height: 44px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.8s; height: 36px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.2s; height: 20px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.5s; height: 12px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.7s; height: 28px;"></div>
<div class="w-1.5 bg-secondary rounded-full waveform-bar" style="animation-delay: 0.1s; height: 40px;"></div>
</div>
<!-- Capture Grid -->
<div class="grid grid-cols-4 gap-gutter px-margin-mobile w-full max-w-xl mx-auto mb-xxl">
<!-- Text -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">edit_note</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Text</span>
</button>
<!-- Voice -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">mic</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Voice</span>
</button>
<!-- Photo -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">photo_camera</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Photo</span>
</button>
<!-- Document -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">description</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Document</span>
</button>
<!-- Link -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">link</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Link</span>
</button>
<!-- Scan -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">document_scanner</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Scan</span>
</button>
<!-- Clipboard -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">content_paste</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Clipboard</span>
</button>
<!-- Location -->
<button class="flex flex-col items-center gap-sm group">
<div class="w-16 h-16 rounded-2xl glass-card flex items-center justify-center text-primary border border-outline-variant group-hover:bg-secondary-container group-hover:border-secondary transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">location_on</span>
</div>
<span class="font-label-xs text-label-xs text-on-surface-variant group-hover:text-primary">Location</span>
</button>
</div>
<!-- Primary Tactile Button -->
<div class="flex flex-col items-center gap-md">
<button class="relative w-24 h-24 rounded-full bg-primary text-white shadow-lg flex items-center justify-center active:scale-90 transition-all duration-300 group overflow-hidden border-4 border-white/20">
<div class="absolute inset-0 bg-gradient-to-tr from-transparent to-white/10"></div>
<span class="material-symbols-outlined text-[40px] relative z-10">center_focus_strong</span>
</button>
<span class="font-label-xs text-label-xs font-bold text-primary uppercase tracking-widest">Hold to Quick Capture</span>
</div>
</main>
<!-- Bottom Navigation Shell (Mandatory Based on JSON & Active State Rules) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-surface-container-low dark:bg-surface-container shadow-sm rounded-t-xl border-t border-outline-variant">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-xs text-label-xs-mobile">Home</span>
</a>
<!-- Ask -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-label-xs text-label-xs-mobile">Ask</span>
</a>
<!-- Capture (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-4 py-1 scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-weight="fill">add_circle</span>
<span class="font-label-xs text-label-xs-mobile">Capture</span>
</a>
<!-- Timeline -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">timeline</span>
<span class="font-label-xs text-label-xs-mobile">Timeline</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-xs text-label-xs-mobile">Profile</span>
</a>
</nav>
<script>
        // Micro-interaction for randomizing waveform height slightly
        const bars = document.querySelectorAll('.waveform-bar');
        setInterval(() => {
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 40) + 12;
                bar.style.height = `${randomHeight}px`;
                bar.style.opacity = (randomHeight / 60) + 0.3;
            });
        }, 800);

        // Tactile button interaction
        const captureBtn = document.querySelector('.group.active\\:scale-90');
        if(captureBtn) {
            captureBtn.addEventListener('touchstart', () => {
                captureBtn.classList.add('bg-secondary');
            });
            captureBtn.addEventListener('touchend', () => {
                captureBtn.classList.remove('bg-secondary');
            });
        }
    </script>
</body></html>
