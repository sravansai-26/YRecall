<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>YRecall | Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "surface-container-lowest": "#ffffff",

                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#004f4f",
                    "tertiary-fixed-dim": "#88d982",
                    "surface-container-highest": "#e8e1da",
                    "tertiary": "#002504",
                    "primary-container": "#003366",
                    "secondary-fixed": "#93f2f2",
                    "tertiary-container": "#003d0b",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#005312",
                    "on-primary-fixed-variant": "#1f477b",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#006e6e",
                    "surface-dim": "#e0d9d1",
                    "primary": "#001e40",
                    "surface-container-high": "#eee7df",
                    "primary-fixed": "#d5e3ff",
                    "on-background": "#1e1b17",
                    "on-tertiary-container": "#5ead5c",
                    "surface-container-low": "#faf3eb",
                    "outline": "#737780",
                    "on-surface": "#1e1b17",
                    "primary-fixed-dim": "#a7c8ff",
                    "background": "#fff8f1",
                    "secondary": "#006a6a",
                    "surface-variant": "#e8e1da",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#3a5f94",
                    "on-primary-container": "#799dd6",
                    "on-tertiary-fixed": "#002204",
                    "inverse-on-surface": "#f7f0e8",
                    "outline-variant": "#c3c6d1",
                    "secondary-container": "#90efef",
                    "inverse-primary": "#a7c8ff",
                    "on-surface-variant": "#43474f",
                    "inverse-surface": "#33302b",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",

            "spacing": {
                    "lg": "24px",
                    "gutter": "16px",
                    "base": "8px",
                    "xxl": "48px",
                    "margin-mobile": "20px",
                    "sm": "8px",
                    "xl": "32px",
                    "xs": "4px",
                    "margin-desktop": "40px",

            "fontFamily": {
                    "title-sm": ["Public Sans"],
                    "body-md": ["Public Sans"],

<style>
        body {
            background-color: #FCFAF7;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .slide-up {
            animation: slideUp 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .pulse-soft {
            animation: pulseSoft 3s ease-in-out infinite;
        }

        .logo-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseSoft {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        .glass-background {
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(252, 250, 247, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface">
<!-- Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden px-margin-mobile md:px-margin-desktop">
<!-- Subtle Ambient Background Layer -->
<div class="absolute inset-0 z-0 glass-background pointer-events-none"></div>
<!-- Central Logo & Branding Content -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Logo Container -->
<div class="mb-xl slide-up" style="animation-delay: 0.2s;">
<div class="relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center">
<!-- Stylized Y / Recall Mark -->
<svg class="w-full h-full text-primary" fill="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path class="logo-draw" d="M30 20 L50 50 L70 20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<path class="logo-draw" d="M50 50 V85" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" style="animation-delay: 0.4s;"></path>
<!-- AI Accent Circle -->
<circle class="fade-in fill-secondary/10" cx="50" cy="50" r="12" style="animation-delay: 1s;"></circle>
<circle class="fade-in fill-secondary" cx="50" cy="50" r="2" style="animation-delay: 1.2s;"></circle>
</svg>
</div>
</div>
<!-- Brand Headline -->
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary mb-sm slide-up" style="animation-delay: 0.4s;">
                YRecall
            </h1>
<!-- Tagline -->
<p class="font-body-md text-body-md text-on-surface-variant font-light tracking-wide slide-up" style="animation-delay: 0.6s;">
                Your Life. Just Recall.
            </p>
</div>
<!-- Bottom Attribution -->
<div class="absolute bottom-16 left-0 w-full flex flex-col items-center space-y-md slide-up" style="animation-delay: 1s;">
<!-- AI Indicator -->
<div class="flex items-center gap-base px-lg py-sm rounded-full bg-surface-container-low border border-outline-variant/30 pulse-soft">
<span class="material-symbols-outlined text-[14px] text-secondary" style="font-variation-settings: 'FILL' 1;">
                    auto_awesome
                </span>
<span class="font-label-xs text-label-xs text-on-surface-variant tracking-[0.1em] uppercase">
                    Powered by AI
                </span>
</div>
<!-- Interaction Hint / Auto-transition loading bar -->
<div class="w-32 h-[2px] bg-outline-variant/20 rounded-full overflow-hidden mt-xl">
<div class="h-full bg-primary transition-all duration-[3000ms] ease-linear w-0" id="loading-bar"></div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
<!-- Subtle floating shapes to give a sense of depth -->
<div class="absolute top-[10%] left-[15%] w-32 h-32 rounded-full border border-primary/10 blur-xl pulse-soft" style="animation-duration: 5s;"></div>
<div class="absolute bottom-[20%] right-[10%] w-48 h-48 rounded-full border border-secondary/10 blur-2xl pulse-soft" style="animation-duration: 7s;"></div>
</div>
</main>
<script>
        // Micro-interaction for the loading bar
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('loading-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Optional: Transition to next screen after splash
            // setTimeout(() => {
            //     window.location.href = '/home';
            // }, 3500);
        });

        // Soft parallax effect on mouse move for high-end feel
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            const logoContainer = document.querySelector('.slide-up');
            if (logoContainer) {
                logoContainer.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
    </script>
</body></html>
