            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;

        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Ambient floating animation for multimodal icons */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        .floating-delayed-1 {
            animation: float 7s ease-in-out infinite -1.5s;
        }

        .floating-delayed-2 {
            animation: float 5s ease-in-out infinite -3s;
        }

        /* Subtle glow for AI tier elements */
        .ai-glow {
            box-shadow: 0 0 20px rgba(0, 51, 102, 0.05);
            border: 1px solid rgba(0, 106, 106, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-background text-on-surface selection:bg-secondary-container">
<!-- Top Navigation (Shell Implementation) -->
<header class="w-full top-0 sticky bg-background z-50">
<nav class="flex justify-between items-center px-margin-mobile py-base w-full max-w-7xl mx-auto">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-headline-md text-headline-md-mobile font-bold text-primary">YRecall</span>
</div>
<button class="text-on-surface-variant font-medium hover:opacity-80 transition-opacity">Skip</button>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="min-h-[calc(100vh-140px)] flex flex-col justify-center items-center px-margin-mobile relative overflow-hidden">
<!-- Animated Background Shader (Embedded via WebGL-Shader) -->

</div>
<div class="max-w-md w-full flex flex-col items-center text-center space-y-xl z-10">
<!-- Visual Component: Bento-Inspired Multimodal Icons -->
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Center Core (AI Node) -->
<div class="w-32 h-32 rounded-full bg-primary-container flex items-center justify-center ai-glow shadow-xl z-20">
<span class="material-symbols-outlined text-on-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<!-- Floating Voice Memo -->
<div class="absolute top-10 left-4 floating-element z-10">
<div class="glass-card ai-glow p-4 rounded-2xl flex items-center gap-3 shadow-md border border-outline-variant/30">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="text-left">
<div class="h-2 w-16 bg-outline-variant rounded-full mb-1"></div>
<div class="h-2 w-10 bg-outline-variant/50 rounded-full"></div>
</div>
</div>
</div>
<!-- Floating Photo/Document -->
<div class="absolute bottom-16 right-0 floating-delayed-1 z-10">
<div class="glass-card ai-glow p-3 rounded-2xl shadow-md border border-outline-variant/30">

<span class="absolute bottom-1 right-1 material-symbols-outlined text-primary text-sm">photo_library</span>
</div>
<div class="h-2 w-12 bg-outline-variant rounded-full mx-auto"></div>
</div>
</div>
<!-- Floating Text/Meeting Note -->
<div class="absolute top-20 right-8 floating-delayed-2 z-10">
<div class="glass-card ai-glow p-4 rounded-2xl shadow-md border border-outline-variant/30 max-w-[120px]">
<span class="material-symbols-outlined text-tertiary-container mb-2">event_note</span>
<div class="space-y-1">
<div class="h-1.5 w-full bg-tertiary-container/20 rounded-full"></div>
<div class="h-1.5 w-4/5 bg-tertiary-container/10 rounded-full"></div>
</div>
</div>
</div>
<!-- Connecting Threads (SVG Art) -->

<path class="text-primary/10" d="M280,150 Q250,200 200,200" fill="transparent" stroke="currentColor" stroke-dasharray="4 4" stroke-width="1"></path>

</div>
<!-- Content Group -->
<div class="space-y-md animate-in fade-in slide-in-from-bottom-4 duration-1000">

<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mx-auto px-4">
                    From voice memos to meetings, everything is automatically indexed and ready for recall.
                </p>

<span>Next</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
<!-- Bottom Spacer for Safe Area -->
<div class="pb-safe h-2"></div>
</footer>
<script>
        // Simple micro-interaction for the central node
        const coreNode = document.querySelector('.primary-container');
        if(coreNode) {
            coreNode.addEventListener('mouseenter', () => {
                coreNode.style.transform = 'scale(1.05)';
                coreNode.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
            coreNode.addEventListener('mouseleave', () => {
                coreNode.style.transform = 'scale(1)';
            });
        }

        // Logic for navigation to next screen
        document.querySelector('button.group').addEventListener('click', () => {
            // Simulated transition effect
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.4s ease-in-out';
            setTimeout(() => {
                // Potential location change or state update
                console.log('Transitioning to Screen 3 of 3...');
            }, 400);
        });
    </script>
